<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>安全助手 - 小安原型</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap");

    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --brand: #3d7eff;
      --brand-soft: #eaf1ff;
      --text: #1f2a3d;
      --sub: #6c7893;
      --line: #e6eaf2;
      --ok: #22a06b;
      --user: #2f75ff;
      --ai: #ffffff;
      --shadow: 0 8px 28px rgba(18, 36, 71, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 10%, rgba(61, 126, 255, 0.14), transparent 35%),
        radial-gradient(circle at 80% 80%, rgba(61, 126, 255, 0.12), transparent 32%),
        var(--bg);
      font-family: "Noto Sans SC", sans-serif;
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .phone {
      width: 390px;
      height: 844px;
      border-radius: 48px;
      background: #0f1727;
      padding: 10px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      position: relative;
    }

    .screen {
      width: 100%;
      height: 100%;
      border-radius: 38px;
      background: linear-gradient(180deg, #f7f9ff 0%, #f5f7fb 100%);
      overflow: hidden;
      position: relative;
    }

    .island {
      width: 126px;
      height: 32px;
      border-radius: 20px;
      background: #0f1727;
      position: absolute;
      top: 9px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 4;
    }

    .topbar {
      height: 84px;
      padding: 44px 18px 12px;
      position: sticky;
      top: 0;
      z-index: 3;
      background: rgba(247, 249, 255, 0.85);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
    }

    .title {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.4px;
    }

    .online-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: #8fb6ff;
      box-shadow: 0 0 0 0 rgba(143, 182, 255, 0.45);
      animation: breathe 2.2s ease-in-out infinite;
      flex: 0 0 auto;
    }

    @keyframes breathe {
      0%, 100% {
        transform: scale(0.92);
        opacity: 0.7;
        box-shadow: 0 0 0 0 rgba(143, 182, 255, 0.34);
      }
      50% {
        transform: scale(1.06);
        opacity: 1;
        box-shadow: 0 0 0 6px rgba(143, 182, 255, 0.1);
      }
    }

    .chat {
      height: calc(100% - 84px - 96px);
      overflow: auto;
      padding: 14px 14px 20px;
      scroll-behavior: smooth;
    }

    .chat.centered {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-top: 0;
      padding-bottom: 0;
    }

    .msg {
      margin: 10px 0;
      display: flex;
    }

    .msg.ai {
      justify-content: flex-start;
    }

    .msg.user {
      justify-content: flex-end;
    }

    .bubble {
      max-width: 84%;
      border-radius: 16px;
      padding: 10px 10px;
      line-height: 1.52;
      font-size: 14px;
      box-shadow: 0 4px 14px rgba(18, 36, 71, 0.08);
      white-space: pre-wrap;
    }

    .ai .bubble {
      background: var(--ai);
      border: 1px solid var(--line);
      border-top-left-radius: 8px;
      max-width: 92%;
    }

    .bubble-proof {
      padding: 6px 6px;
      box-shadow: none;
      border-radius: 14px;
      white-space: normal;
    }

    .bubble-path {
      padding: 6px 6px;
      box-shadow: none;
      border-radius: 14px;
      white-space: normal;
    }

    .bubble-interpret {
      padding: 12px 12px 14px;
      white-space: normal;
    }

    .interpret-lead {
      font-size: 15px;
      font-weight: 700;
      color: #162032;
      line-height: 1.45;
      margin: 0 0 12px;
      letter-spacing: 0.02em;
    }

    .interpret-section {
      margin: 0 0 10px;
      padding: 10px 11px 11px 12px;
      border-left: 3px solid var(--brand);
      background: linear-gradient(90deg, rgba(61, 126, 255, 0.07), rgba(61, 126, 255, 0.02));
      border-radius: 0 12px 12px 0;
      font-size: 14px;
      line-height: 1.58;
      color: #334159;
    }

    .interpret-section:last-of-type {
      margin-bottom: 0;
    }

    .interpret-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--brand);
      text-transform: none;
      letter-spacing: 0.04em;
      margin-bottom: 7px;
    }

    .interpret-kw {
      color: #1a2744;
      font-weight: 600;
    }

    .interpret-pill {
      display: inline;
      padding: 2px 8px;
      margin: 0 1px;
      background: var(--brand-soft);
      color: #1e5ad4;
      border-radius: 6px;
      font-weight: 700;
      font-size: 13px;
      line-height: 1.5;
    }

    .interpret-note {
      margin-top: 12px;
      padding: 10px 11px;
      border-radius: 10px;
      background: #f4f6fa;
      border: 1px solid #e8ecf4;
      font-size: 13px;
      line-height: 1.55;
      color: #4d5c73;
    }

    .interpret-note .interpret-note-title {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #2f3d56;
      margin-bottom: 6px;
    }

    .user .bubble {
      background: linear-gradient(180deg, #4989ff, #2f75ff);
      color: #fff;
      border-top-right-radius: 6px;
    }

    .tiny {
      margin-top: 6px;
      opacity: 0.9;
      font-size: 11px;
    }

    .ai-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.85);
      font-size: 9px;
      line-height: 1;
      margin-left: 4px;
      vertical-align: -1px;
    }

    .bubble-loading-ai {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      min-height: 44px;
    }

    .bubble-loading-text {
      font-size: 14px;
      color: var(--sub);
      font-weight: 500;
    }

    .loading-dots {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .loading-dots span {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--brand);
      opacity: 0.35;
      animation: loadDot 1s ease-in-out infinite;
    }

    .loading-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .loading-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes loadDot {
      0%, 100% {
        transform: translateY(0);
        opacity: 0.3;
      }
      50% {
        transform: translateY(-5px);
        opacity: 1;
      }
    }

    .bubble-loading-graphic {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px 20px;
      min-height: 44px;
      min-width: 64px;
    }

    .bubble-loading-bars {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
      height: 28px;
    }

    .bubble-loading-bars span {
      width: 5px;
      height: 10px;
      border-radius: 999px;
      background: var(--brand);
      opacity: 0.4;
      transform-origin: center bottom;
      animation: aiLoadBar 0.95s ease-in-out infinite;
    }

    .bubble-loading-bars span:nth-child(2) {
      animation-delay: 0.12s;
    }

    .bubble-loading-bars span:nth-child(3) {
      animation-delay: 0.24s;
    }

    .bubble-loading-bars span:nth-child(4) {
      animation-delay: 0.36s;
    }

    .bubble-loading-bars span:nth-child(5) {
      animation-delay: 0.48s;
    }

    @keyframes aiLoadBar {
      0%, 100% {
        transform: scaleY(0.5);
        opacity: 0.35;
      }
      50% {
        transform: scaleY(1.25);
        opacity: 1;
      }
    }

    .quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 8px 0 12px 0;
    }

    .chip {
      border: 1px solid #cfd9ed;
      background: #fff;
      color: #315aab;
      padding: 8px 12px;
      font-size: 13px;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 2px 10px rgba(70, 110, 190, 0.1);
    }

    .chip:hover {
      transform: translateY(-1px);
      border-color: #b6c8ea;
      background: #f4f8ff;
    }

    .action-row {
      margin: 6px 0 12px;
      display: flex;
      justify-content: flex-start;
    }

    .action-wrap {
      width: 92%;
    }

    .action-btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 11px 12px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(180deg, #4a8bff, #2f75ff);
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(47, 117, 255, 0.24);
    }

    .home-hero {
      width: 100%;
      animation: in 0.28s ease;
    }

    .home-greeting {
      font-size: 20px;
      line-height: 1.2;
      font-weight: 600;
      color: #252f42;
      margin: 0 2px 8px;
    }

    .home-title {
      font-size: 23px;
      line-height: 1.26;
      font-weight: 700;
      margin: 0 2px 14px;
      letter-spacing: 0;
      color: #1a2333;
    }

    .home-title .accent {
      color: #3b82f6;
    }

    .guide-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .guide-card {
      appearance: none;
      width: 100%;
      border: 1px solid #e7ebf3;
      background: #f3f5f8;
      border-radius: 16px;
      padding: 15px 14px;
      min-height: 58px;
      color: #1d2433;
      cursor: pointer;
      transition: all 0.18s ease;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 18px;
      line-height: 1.35;
      font-weight: 600;
      letter-spacing: 0;
      text-align: left;
    }

    .guide-card:hover {
      transform: translateY(-1px);
      background: #eef3fb;
      border-color: #d8e2f6;
    }

    .guide-card .arrow {
      margin-left: 8px;
      color: #606a7d;
      font-size: 20px;
      font-weight: 700;
      line-height: 1;
    }

    .card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 6px 16px rgba(18, 36, 71, 0.08);
      margin-top: 6px;
    }

    .card h4 {
      margin: 0 0 6px;
      font-size: 13px;
    }

    .card ul {
      margin: 0;
      padding-left: 18px;
      color: #42506b;
      font-size: 13px;
      line-height: 1.6;
    }

    .task-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      color: #3f4d69;
      font-size: 12px;
      line-height: 1.45;
      background: #f7f9fd;
      border: 1px solid #e8edf6;
      border-radius: 10px;
      padding: 7px 8px;
    }

    .task-dot {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 1px solid #c7d6f4;
      background: #edf4ff;
      color: #5573af;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      flex: 0 0 auto;
      margin-top: 2px;
      font-weight: 700;
    }

    .proof-shell {
      width: 100%;
      background: #f4f5f7;
      border: 1px solid #e1e5ec;
      border-radius: 14px;
      padding: 8px 8px 10px;
      margin-top: 0;
    }

    .proof-title-row {
      margin-bottom: 2px;
    }

    .proof-title-row .proof-title {
      margin-bottom: 0;
    }

    .proof-title-row--stamped {
      position: relative;
      display: flex;
      align-items: center;
      min-height: 42px;
      padding-right: 54px;
    }

    .proof-title-row--stamped .proof-title {
      position: relative;
      z-index: 1;
    }

    .proof-title-row--stamped .proof-ready-stamp {
      position: absolute;
      right: 0;
      top: 50%;
      width: 48px;
      height: 48px;
      transform: translateY(-50%) rotate(-11deg);
      z-index: 0;
    }

    .proof-title {
      font-size: 15px;
      line-height: 1.24;
      color: #1d2638;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .proof-desc {
      font-size: 12px;
      color: #717b8f;
      line-height: 1.26;
      margin-bottom: 4px;
    }

    .proof-card {
      border: 1px solid #d8dde7;
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
    }

    .proof-head {
      padding: 7px 10px;
      border-bottom: 1px solid #eceff4;
      font-size: 12px;
      font-weight: 600;
      color: #59657e;
      background: #f6f8fb;
    }

    .proof-shell-ready .proof-list {
      position: relative;
      z-index: 1;
    }

    .proof-list {
      padding: 0 10px;
      background: #fff;
    }

    .proof-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid #eef1f6;
    }

    .proof-item:last-child { border-bottom: none; }

    .proof-left {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      min-width: 0;
    }

    .proof-icon {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: #f1f3f7;
      color: #9aa3b6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex: 0 0 auto;
      margin-top: 1px;
    }

    .proof-text {
      min-width: 0;
    }

    .proof-name {
      font-size: 15px;
      color: #1f2838;
      font-weight: 600;
      line-height: 1.2;
    }

    .proof-meta {
      margin-top: 1px;
      font-size: 11px;
      color: #8a93a5;
      line-height: 1.22;
    }

    .proof-status {
      font-size: 12px;
      border-radius: 10px;
      padding: 4px 10px;
      white-space: nowrap;
      font-weight: 600;
    }

    .proof-status.ready {
      background: #eaf7ef;
      color: #2e9d67;
    }

    .proof-status.pending {
      background: #fff1e7;
      color: #d06e21;
    }

    .proof-shell-ready .proof-title-row {
      margin-bottom: 6px;
    }

    .proof-shell-ready .proof-title {
      font-size: 13px;
      font-weight: 600;
      color: #8f9bb3;
      line-height: 1.35;
    }

    .proof-shell-ready .proof-desc {
      display: none;
    }

    .proof-ready-stamp {
      border-radius: 50%;
      box-sizing: border-box;
      border: 2px solid rgba(61, 126, 255, 0.12);
      background: rgba(234, 241, 255, 0.38);
      color: rgba(61, 126, 255, 0.28);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      line-height: 1.2;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      pointer-events: none;
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.7),
        0 1px 3px rgba(18, 36, 71, 0.04);
    }

    .proof-upload-box {
      margin: 8px 8px 4px;
      border: 1px dashed #d8dde7;
      border-radius: 12px;
      background: #fcfcfd;
      min-height: 96px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #8d95a5;
      padding: 10px 12px;
      line-height: 1.4;
      cursor: pointer;
    }

    .proof-upload-plus {
      font-size: 30px;
      line-height: 1;
      color: #c3c7d0;
      margin-bottom: 6px;
      font-weight: 300;
    }

    .proof-upload-title {
      font-size: 13px;
      color: #6f788b;
      margin-bottom: 4px;
    }

    .proof-upload-desc {
      font-size: 11px;
      white-space: nowrap;
    }

    .path-shell {
      width: 100%;
      background: #f4f5f7;
      border: 1px solid #e1e5ec;
      border-radius: 14px;
      padding: 6px 6px 8px;
    }

    .path-head {
      font-size: 15px;
      font-weight: 600;
      color: #2b3852;
      margin: 0 2px 2px;
    }

    .path-card {
      border: 1px solid #d8dde7;
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
    }

    .path-tip {
      margin: 6px 2px 0;
      font-size: 12px;
      color: #7a859a;
      line-height: 1.35;
    }

    .path-list {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .path-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 6px 10px;
      border-bottom: 1px solid #eef1f6;
      font-size: 14px;
      color: #3f4d69;
      line-height: 1.4;
    }

    .path-item:last-child {
      border-bottom: none;
    }

    .path-index {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      border: 1px solid #c7d6f4;
      background: #edf4ff;
      color: #5573af;
      font-size: 10px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      margin-top: 1px;
    }

    .upload-row {
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px dashed #b8c8eb;
      border-radius: 12px;
      padding: 10px;
      background: #f7faff;
      font-size: 13px;
      color: #2d4267;
      gap: 8px;
    }

    .tag {
      color: #2f75ff;
      font-size: 12px;
      font-weight: 600;
      background: #eaf1ff;
      border-radius: 999px;
      padding: 3px 8px;
    }

    .bottom {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      border-top: 1px solid var(--line);
      padding: 10px 12px 14px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(6px);
    }

    .cert-page {
      position: absolute;
      inset: 0;
      background: #f3f4f6;
      z-index: 20;
      display: none;
      flex-direction: column;
    }

    .cert-page.show {
      display: flex;
    }

    .cert-header {
      height: 92px;
      padding: 44px 14px 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      border-bottom: 1px solid #e7eaf0;
      background: #f7f8fa;
    }

    .cert-back {
      position: absolute;
      left: 10px;
      top: 44px;
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      color: #2c3345;
      font-size: 22px;
      cursor: pointer;
    }

    .cert-title {
      font-size: 18px;
      font-weight: 700;
      color: #1f2738;
    }

    .cert-content {
      padding: 14px 12px 20px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .cert-card {
      border-radius: 14px;
      padding: 14px;
      border: 1px solid rgba(0, 0, 0, 0.04);
      position: relative;
      overflow: hidden;
    }

    .cert-card.personal {
      background: linear-gradient(180deg, #fdf7df, #f9f1d0);
    }

    .cert-card.enterprise {
      background: linear-gradient(180deg, #dfeeff, #d4e6ff);
    }

    .cert-h3 {
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 6px 0;
      color: #d58a1e;
    }

    .cert-enterprise .cert-h3 {
      color: #2271c9;
    }

    .cert-sub {
      margin: 0 0 12px 0;
      font-size: 13px;
      color: #5f6d86;
    }

    .cert-go {
      border: none;
      border-radius: 999px;
      padding: 8px 16px;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(180deg, #ff4d75, #f53563);
    }

    .cert-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 8px;
    }

    .cert-mini {
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid rgba(130, 163, 218, 0.35);
      border-radius: 10px;
      padding: 10px 10px 12px;
    }

    .cert-mini h4 {
      margin: 0 0 4px;
      font-size: 15px;
      color: #2a3854;
    }

    .cert-mini p {
      margin: 0 0 10px;
      font-size: 12px;
      line-height: 1.35;
      color: #5c6b87;
    }

    .cert-mini .mini-go {
      border: none;
      border-radius: 999px;
      padding: 5px 11px;
      color: #fff;
      background: linear-gradient(180deg, #2991ff, #1f79e6);
      font-size: 14px;
      font-weight: 600;
    }

    .learn-page {
      position: absolute;
      inset: 0;
      background: #f3f4f6;
      z-index: 21;
      display: none;
      flex-direction: column;
    }

    .learn-page.show {
      display: flex;
    }

    .learn-header {
      height: 92px;
      padding: 44px 14px 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      border-bottom: 1px solid #e7eaf0;
      background: #f7f8fa;
    }

    .learn-back {
      position: absolute;
      left: 10px;
      top: 44px;
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      color: #2c3345;
      font-size: 22px;
      cursor: pointer;
    }

    .learn-title {
      font-size: 18px;
      font-weight: 700;
      color: #1f2738;
    }

    .learn-content {
      padding: 14px 12px 18px;
    }

    .learn-q {
      font-size: 14px;
      font-weight: 600;
      color: #2f3c56;
      margin-bottom: 10px;
    }

    .learn-card {
      background: #fff;
      border: 1px solid #e5e9f1;
      border-radius: 10px;
      padding: 8px 12px;
      margin-bottom: 12px;
    }

    .learn-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #edf1f6;
      gap: 8px;
    }

    .learn-row:last-child {
      border-bottom: none;
    }

    .learn-name {
      font-size: 15px;
      color: #222d40;
    }

    .learn-btn {
      border: none;
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(180deg, #2a8cff, #1f79e6);
    }

    .learn-btn.secondary {
      background: #9ebbf7;
    }

    .learn-tip {
      font-size: 12px;
      line-height: 1.5;
      color: #6a7488;
    }

    .celebrate-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 40;
      overflow: hidden;
    }

    .confetti {
      position: absolute;
      top: -12px;
      width: 8px;
      height: 12px;
      border-radius: 2px;
      opacity: 0;
      animation: confetti-fall 2200ms ease-out forwards;
    }

    @keyframes confetti-fall {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform: translateY(700px) rotate(520deg);
        opacity: 0;
      }
    }

    .center-success {
      width: 92%;
      margin: 0 auto;
    }

    .center-success-text {
      font-size: 18px;
      line-height: 1.45;
      font-weight: 600;
      color: #1f2a3d;
      text-align: left;
      white-space: normal;
    }

    .center-success-link {
      margin-top: 10px;
      text-align: center;
      font-size: 14px;
      color: #5f6f8f;
      font-weight: 500;
    }

    .voice-box {
      height: 56px;
      border-radius: 18px;
      background: #ffffff;
      border: 1px solid #e6ebf4;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 22px rgba(18, 36, 71, 0.08);
      width: 100%;
      padding-right: 54px;
    }

    .input-row {
      position: relative;
      display: block;
      width: 100%;
    }

    .switch-keyboard-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 1.6px solid #111;
      background: #fff;
      color: #111;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      z-index: 2;
      line-height: 1;
    }

    .switch-keyboard-btn svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .voice-box:active {
      transform: scale(0.99);
      background: #eaf1ff;
    }

    .voice-text {
      font-size: 18px;
      color: #1f2533;
      z-index: 2;
      font-weight: 700;
    }

    .waveform {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 3px;
      z-index: 1;
      background: rgba(47, 117, 255, 0.08);
    }

    .waveform.active {
      display: flex;
    }

    .bar {
      width: 4px;
      height: 8px;
      border-radius: 999px;
      background: var(--brand);
      animation: wave 0.9s infinite ease-in-out;
    }

    .bar:nth-child(2) { animation-delay: 0.05s; }
    .bar:nth-child(3) { animation-delay: 0.1s; }
    .bar:nth-child(4) { animation-delay: 0.15s; }
    .bar:nth-child(5) { animation-delay: 0.2s; }
    .bar:nth-child(6) { animation-delay: 0.25s; }
    .bar:nth-child(7) { animation-delay: 0.3s; }
    .bar:nth-child(8) { animation-delay: 0.35s; }
    .bar:nth-child(9) { animation-delay: 0.4s; }

    @keyframes wave {
      0%, 100% { height: 8px; opacity: 0.5; }
      50% { height: 28px; opacity: 1; }
    }

    .status-ok {
      color: var(--ok);
      font-weight: 700;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 13px;
      background: #f5f8ff;
      border: 1px solid #dce6f8;
      border-radius: 8px;
      padding: 2px 6px;
    }

    .fade-in {
      animation: in 0.26s ease;
    }

    @keyframes in {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

  </style>
</head>
<body>
  <div class="phone">
    <div class="screen">
      <div class="island"></div>
      <div class="topbar">
        <div class="title"><span class="online-dot" aria-hidden="true"></span>安全助手</div>
      </div>

      <div id="chat" class="chat"></div>

      <div class="bottom">
        <div class="input-row">
          <div id="voiceBox" class="voice-box">
            <div id="voiceText" class="voice-text">按住说话</div>
            <div id="wave" class="waveform">
              <span class="bar"></span><span class="bar"></span><span class="bar"></span>
              <span class="bar"></span><span class="bar"></span><span class="bar"></span>
              <span class="bar"></span><span class="bar"></span><span class="bar"></span>
            </div>
          </div>
          <button class="switch-keyboard-btn" type="button" aria-label="切换键盘">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3.5" y="4" width="17" height="16" rx="4" fill="none" stroke="currentColor" stroke-width="1.8"></rect>
              <circle cx="8" cy="9" r="1.2" fill="currentColor"></circle>
              <circle cx="12" cy="9" r="1.2" fill="currentColor"></circle>
              <circle cx="16" cy="9" r="1.2" fill="currentColor"></circle>
              <circle cx="8" cy="13" r="1.2" fill="currentColor"></circle>
              <circle cx="12" cy="13" r="1.2" fill="currentColor"></circle>
              <circle cx="16" cy="13" r="1.2" fill="currentColor"></circle>
              <rect x="8" y="16" width="8" height="1.6" rx="0.8" fill="currentColor"></rect>
            </svg>
          </button>
        </div>
      </div>

      <div id="certPage" class="cert-page">
        <div class="cert-header">
          <button id="certBackBtn" class="cert-back" aria-label="返回">‹</button>
          <div class="cert-title">抖音官方认证</div>
        </div>
        <div class="cert-content">
          <div class="cert-card personal">
            <h3 class="cert-h3">个人认证</h3>
            <p class="cert-sub">适合公众人物、领域专家、影视明星等</p>
            <button class="cert-go" type="button">去认证</button>
          </div>
          <div class="cert-card enterprise cert-enterprise">
            <h3 class="cert-h3">企业机构认证</h3>
            <div class="cert-grid">
              <div class="cert-mini">
                <h4>企业认证</h4>
                <p>民营企业、个体工商户</p>
                <button class="mini-go" type="button">去认证</button>
              </div>
              <div class="cert-mini">
                <h4>机构认证</h4>
                <p>政府机构、内容媒体</p>
                <button class="mini-go" type="button">去认证</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="learnPage" class="learn-page">
        <div class="learn-header">
          <button id="learnBackBtn" class="learn-back" aria-label="返回">‹</button>
          <div class="learn-title">账号自助解封</div>
        </div>
        <div class="learn-content">
          <div class="learn-q">如何恢复账号？</div>
          <div class="learn-card">
            <div class="learn-row">
              <div class="learn-name">通过规则考试 ⓘ</div>
              <button class="learn-btn" type="button">去考试</button>
            </div>
            <div class="learn-row">
              <div class="learn-name">完成规则学习</div>
              <button class="learn-btn secondary" type="button">去学习</button>
            </div>
          </div>
          <div class="learn-tip">完成全部任务后，账号即可自动恢复正常，请遵守《抖音社区自律公约》，与我们共同维护良好的社区氛围。</div>
        </div>
      </div>

      <div id="celebrateLayer" class="celebrate-layer"></div>
    </div>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const voiceBox = document.getElementById("voiceBox");
    const voiceText = document.getElementById("voiceText");
    const wave = document.getElementById("wave");
    const certPage = document.getElementById("certPage");
    const certBackBtn = document.getElementById("certBackBtn");
    const learnPage = document.getElementById("learnPage");
    const learnBackBtn = document.getElementById("learnBackBtn");
    const celebrateLayer = document.getElementById("celebrateLayer");

    let stage = "A";
    let uploadDone = false;
    let reasonDone = false;
    let certOpenedFromAppealFlow = false;
    let isHolding = false;
    let holdTimer = null;

    function scrollBottom() {
      chat.scrollTop = chat.scrollHeight;
    }

    const AI_GRAPHIC_LOAD_MS = 1200;

    function showAILoading(kind) {
      const wrap = document.createElement("div");
      wrap.className = "msg ai fade-in";
      wrap.dataset.aiLoading = "";
      if (kind === "planning") {
        wrap.innerHTML = `
        <div class="bubble bubble-loading-ai">
          <span class="bubble-loading-text">小安帮你规划申诉方案中</span>
          <span class="loading-dots" aria-hidden="true"><span></span><span></span><span></span></span>
        </div>`.trim();
      } else {
        wrap.innerHTML = `
        <div class="bubble bubble-loading-graphic" role="status" aria-label="小安正在回复">
          <div class="bubble-loading-bars" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span></div>
        </div>`.trim();
      }
      chat.appendChild(wrap);
      scrollBottom();
      return wrap;
    }

    function removeAILoading(wrap) {
      if (wrap && wrap.parentNode) wrap.remove();
    }

    function runAfterGraphicAILoad(fn) {
      const loading = showAILoading("graphic");
      setTimeout(() => {
        removeAILoading(loading);
        fn();
      }, AI_GRAPHIC_LOAD_MS);
    }

    function openCertificationPage() {
      certOpenedFromAppealFlow = true;
      certPage.classList.add("show");
    }

    function closeCertificationPage() {
      certPage.classList.remove("show");
      if (certOpenedFromAppealFlow) {
        certOpenedFromAppealFlow = false;
        finishAppealAfterCertReturn();
      }
    }

    function finishAppealAfterCertReturn() {
      if (stage !== "B") return;
      stage = "D";
      uploadDone = true;
      chat.querySelectorAll(".bubble-proof").forEach((el) => {
        const msg = el.closest(".msg.ai");
        if (msg) msg.remove();
      });
      chat.querySelectorAll(".quick-replies").forEach((box) => {
        const hit = Array.from(box.querySelectorAll(".chip")).some((chip) => {
          const t = chip.textContent || "";
          return t.includes("在哪获取保险销售资质证明") || t.includes("前往认证");
        });
        if (hit) box.remove();
      });
      runAfterGraphicAILoad(() => {
        const proofCard = document.createElement("div");
        proofCard.className = "msg ai fade-in";
        proofCard.innerHTML = `
        <div class="bubble bubble-proof">
          <div class="proof-shell proof-shell-ready">
            <div class="proof-title-row proof-title-row--stamped">
              <div class="proof-ready-stamp" aria-hidden="true">准备完毕</div>
              <div class="proof-title">小安帮你检测到你需要提供以下资质证明，申诉成功率会更高</div>
            </div>
            <div class="proof-card">
              <div class="proof-head">材料清单</div>
              <div class="proof-list">
                <div class="proof-item">
                  <div class="proof-left">
                    <div class="proof-icon">证</div>
                    <div class="proof-text">
                      <div class="proof-name">实名认证</div>
                      <div class="proof-meta">站内实名信息可直接复用</div>
                    </div>
                  </div>
                  <span class="proof-status ready">已复用</span>
                </div>
                <div class="proof-item">
                  <div class="proof-left">
                    <div class="proof-icon">资</div>
                    <div class="proof-text">
                      <div class="proof-name">保险销售资质证明</div>
                      <div class="proof-meta">需上传证书照片或电子证明</div>
                    </div>
                  </div>
                  <span class="proof-status ready">已认证</span>
                </div>
              </div>
            </div>
          </div>
        </div>`.trim();
        chat.appendChild(proofCard);
        scrollBottom();
        msgAI(
          "材料已上传完成，你可以再补充一些申诉理由，帮助审核人员更准确地判断情况并完成审核。（按住底部按钮语音快速描述）"
        );
      });
    }

    function openLearnPage() {
      learnPage.classList.add("show");
    }

    function closeLearnPage() {
      learnPage.classList.remove("show");
      runConfetti();
      showCenteredSuccess("恭喜你完成了答题考试，你的账号状态已恢复正常，请遵守法律法规及《抖音社区自律公约》，共同维护良好的社区生态");
    }

    function runConfetti() {
      celebrateLayer.innerHTML = "";
      const colors = ["#ff6b8a", "#ffd166", "#56cfe1", "#7aa2ff", "#7bd88f", "#c39bff"];
      const count = 22;
      for (let i = 0; i < count; i += 1) {
        const piece = document.createElement("span");
        piece.className = "confetti";
        piece.style.left = `${Math.random() * 100}%`;
        piece.style.background = colors[i % colors.length];
        piece.style.animationDelay = `${Math.random() * 220}ms`;
        piece.style.transform = `translateY(0) rotate(${Math.random() * 180}deg)`;
        celebrateLayer.appendChild(piece);
      }
      setTimeout(() => {
        celebrateLayer.innerHTML = "";
      }, 2600);
    }

    function showCenteredSuccess(text) {
      chat.innerHTML = "";
      chat.classList.add("centered");
      const wrap = document.createElement("div");
      wrap.className = "center-success fade-in";
      wrap.innerHTML = `
        <div class="center-success-text">${text}</div>
        <div class="center-success-link">查看其他违规➡️</div>
      `.trim();
      chat.appendChild(wrap);
      scrollBottom();
    }

    function msgAI(html, bubbleExtraClass = "") {
      const wrap = document.createElement("div");
      wrap.className = "msg ai fade-in";
      const bubbleClass = bubbleExtraClass.trim()
        ? `bubble ${bubbleExtraClass.trim()}`
        : "bubble";
      wrap.innerHTML = `<div class="${bubbleClass}">${html}</div>`;
      chat.appendChild(wrap);
      scrollBottom();
      return wrap;
    }

    function msgUser(html) {
      const wrap = document.createElement("div");
      wrap.className = "msg user fade-in";
      wrap.innerHTML = `<div class="bubble">${html}</div>`;
      chat.appendChild(wrap);
      scrollBottom();
      return wrap;
    }

    function chips(items) {
      const box = document.createElement("div");
      box.className = "quick-replies fade-in";
      items.forEach((item) => {
        const btn = document.createElement("button");
        btn.className = "chip";
        btn.textContent = item.label;
        btn.onclick = item.onClick;
        box.appendChild(btn);
      });
      chat.appendChild(box);
      scrollBottom();
    }

    function actionButton(label, onClick) {
      const row = document.createElement("div");
      row.className = "action-row fade-in";
      row.innerHTML = `<div class="action-wrap"><button class="action-btn" type="button">${label}</button></div>`;
      row.querySelector("button").onclick = onClick;
      chat.appendChild(row);
      scrollBottom();
    }

    function sendInterpretationMessage() {
      runAfterGraphicAILoad(() => {
        msgAI(
          `
          <div class="interpret-lead">你的违规核心原因可以这样理解：</div>
          <div class="interpret-section">
            <span class="interpret-label">判定依据</span>
            你的作品中出现了<span class="interpret-kw">保险产品推荐或引导交易</span>相关表达，但账号在发布当时<span class="interpret-kw">未完成</span>平台要求的<span class="interpret-kw">保险相关资质认证</span>，系统会将这类内容判定为 <span class="interpret-pill">无资质推荐保险产品</span>。
          </div>
          <div class="interpret-section">
            <span class="interpret-label">平台关切</span>
            从平台视角，这类内容可能让用户在缺乏充分保障与验证的情况下做出金融决策，<span class="interpret-kw">存在财产安全风险</span>，因此被限制或处罚。
          </div>
          <div class="interpret-note">
            <span class="interpret-note-title">一句话总结</span>
            问题不一定在于主观恶意，而是 <span class="interpret-kw">内容属性（保险推荐）</span> 与 <span class="interpret-kw">账号资质状态（未认证）</span> 不匹配，从而触发规则。
          </div>
          `.trim(),
          "bubble-interpret"
        );
      });
    }

    function dismissIntro() {
      chat.classList.remove("centered");
      const introPanel = document.getElementById("intro-panel");
      if (introPanel) introPanel.remove();
    }

    function pageA() {
      chat.classList.add("centered");
      const intro = document.createElement("div");
      intro.className = "home-hero";
      intro.id = "intro-panel";
      intro.innerHTML = `
        <div class="home-greeting">下午好，momo</div>
        <div class="home-title">小安检测到你的账号违规了，<span class="accent">你可以通过提交有效材料，发起申诉。</span>让平台进行二次复核。</div>
        <div class="guide-grid">
          <button class="guide-card" id="c-appeal">
            <span>帮我申诉</span><span class="arrow">→</span>
          </button>
          <button class="guide-card" id="c-rule">
            <span>我哪违规了</span><span class="arrow">→</span>
          </button>
          <button class="guide-card" id="c-release">
            <span>帮我解除处罚</span><span class="arrow">→</span>
          </button>
        </div>
      `;
      chat.appendChild(intro);
      scrollBottom();

      document.getElementById("c-appeal").onclick = () => goB();
      document.getElementById("c-rule").onclick = () => {
        dismissIntro();
        msgUser("我哪违规了");
        runAfterGraphicAILoad(() => {
          msgAI("参考平台规则，为保障用户权益与安全，规范平台保险服务类内容发布，作品应避免“涉及无资质推荐保险产品”的内容，易给用户带来财产安全风险。");
          chips([
            {
              label: "帮我解读",
              onClick: () => {
                msgUser("帮我解读");
                sendInterpretationMessage();
              }
            }
          ]);
        });
      };
      document.getElementById("c-release").onclick = goRelease;
    }

    function goRelease() {
      if (stage !== "A") return;
      stage = "R";
      dismissIntro();
      msgUser("帮我解除处罚");
      runAfterGraphicAILoad(() => {
        msgAI("别担心，小安帮你分析出最高效的解脱方案，你可以进行【自助解封】，学习平台规则，考试通过后即可解除处罚～");
        actionButton("去学习", openLearnPage);
      });
    }

    function goB(userMessage = "帮我申诉") {
      if (stage !== "A") return;
      stage = "B";
      dismissIntro();
      const userMsgEl = msgUser(userMessage);
      const loadingWrap = showAILoading("planning");
      setTimeout(() => {
        removeAILoading(loadingWrap);
        const proofCard = document.createElement("div");
        proofCard.className = "msg ai fade-in";
        proofCard.innerHTML = `
        <div class="bubble bubble-proof">
          <div class="proof-shell">
            <div class="proof-title-row">
              <div class="proof-title">小安帮你检测到你需要提供以下资质证明，申诉成功率会更高</div>
            </div>
            <div class="proof-desc">已自动帮你补充站内可复用的材料，请继续补充待上传材料</div>
            <div class="proof-card">
              <div class="proof-head">材料清单</div>
              <div class="proof-list">
                <div class="proof-item">
                  <div class="proof-left">
                    <div class="proof-icon">证</div>
                    <div class="proof-text">
                      <div class="proof-name">实名认证</div>
                      <div class="proof-meta">站内实名信息可直接复用</div>
                    </div>
                  </div>
                  <span class="proof-status ready">已复用</span>
                </div>
                <div class="proof-item">
                  <div class="proof-left">
                    <div class="proof-icon">资</div>
                    <div class="proof-text">
                      <div class="proof-name">保险销售资质证明</div>
                      <div class="proof-meta">需上传证书照片或电子证明</div>
                    </div>
                  </div>
                  <span class="proof-status pending">待上传</span>
                </div>
              </div>
              <div class="proof-upload-box" onclick="goC()">
                <div class="proof-upload-plus">+</div>
                <div class="proof-upload-title">上传保险销售资质证明</div>
                <div class="proof-upload-desc">请上传证书照片或电子证明，信息需清晰可见</div>
              </div>
            </div>
          </div>
        </div>`.trim();
        chat.appendChild(proofCard);
        scrollBottom();
        chips([
          {
            label: "在哪获取保险销售资质证明？",
            onClick: () => {
              msgUser("在哪获取保险销售资质证明？");
              sendMaterialPathGuide();
            }
          }
        ]);

        // After assistant response is rendered, pin the user's trigger message
        // to the top of the chat viewport for clearer context.
        setTimeout(() => {
          const topTarget = Math.max(userMsgEl.offsetTop - 6, 0);
          chat.scrollTo({ top: topTarget, behavior: "smooth" });
        }, 180);
      }, 1500);
    }

    function sendMaterialPathGuide() {
      runAfterGraphicAILoad(() => {
        msgAI("帮你找到材料获取路径");
        const pathCard = document.createElement("div");
        pathCard.className = "msg ai fade-in";
        pathCard.innerHTML = `
        <div class="bubble bubble-path">
          <div class="path-shell">
            <div class="path-head">材料获取路径</div>
            <div class="path-card">
              <ul class="path-list">
                <li class="path-item"><span class="path-index">1</span><span>打开抖音 -> 右下角「我」 -> 右上角「≡」</span></li>
                <li class="path-item"><span class="path-index">2</span><span>进入「创作者服务中心」</span></li>
                <li class="path-item"><span class="path-index">3</span><span>下滑找到「官方认证」</span></li>
                <li class="path-item"><span class="path-index">4</span><span>选择「财经 / 金融 / 保险」类专项认证（或「企业认证」）</span></li>
                <li class="path-item"><span class="path-index">5</span><span>按提示上传材料：个人（保险销售从业人员资格证书清晰照片、身份证正反面、手持身份证照片）；企业（营业执照、保险业务经营许可证、法人身份证、加盖公章的认证公函）</span></li>
                <li class="path-item"><span class="path-index">6</span><span>完成资质考试（财经 / 保险类需通过），提交审核</span></li>
              </ul>
            </div>
            <div class="path-tip">可以截图后，点击「前往认证」获取材料哦</div>
          </div>
        </div>`.trim();
        chat.appendChild(pathCard);
        scrollBottom();
        chips([
          { label: "前往认证", onClick: openCertificationPage }
        ]);
      });
    }

    function goC() {
      if (stage !== "B") return;
      stage = "D";
      removeAppealAndGuideBubbles();
      updateProofUploadedState();
      uploadDone = true;
      scrollBottom();
      runAfterGraphicAILoad(() => {
        msgAI("材料已上传完成，你可以再补充一些申诉理由，帮助审核人员更准确地判断情况并完成审核。（按住底部按钮语音快速描述）");
      });
    }

    function removeAppealAndGuideBubbles() {
      chat.querySelectorAll(".msg.user").forEach((msgEl) => {
        const txt = (msgEl.textContent || "").trim();
        if (
          txt.includes("帮我申诉") ||
          txt.includes("我要申诉") ||
          txt.includes("在哪获取保险销售资质证明")
        ) {
          msgEl.remove();
        }
      });
      chat.querySelectorAll(".quick-replies").forEach((box) => {
        const hasTarget = Array.from(box.querySelectorAll(".chip")).some((chip) =>
          (chip.textContent || "").includes("在哪获取保险销售资质证明")
        );
        if (hasTarget) box.remove();
      });
    }

    function updateProofUploadedState() {
      const shell = chat.querySelector(".bubble-proof .proof-shell");
      if (shell) shell.classList.add("proof-shell-ready");
      const titleRow = shell && shell.querySelector(".proof-title-row");
      const titleEl = shell && shell.querySelector(".proof-title");
      if (titleRow && titleEl && !titleRow.querySelector(".proof-ready-stamp")) {
        titleRow.classList.add("proof-title-row--stamped");
        const stamp = document.createElement("div");
        stamp.className = "proof-ready-stamp";
        stamp.setAttribute("aria-hidden", "true");
        stamp.textContent = "准备完毕";
        titleRow.insertBefore(stamp, titleEl);
      }
      const pending = chat.querySelector(".proof-status.pending");
      if (pending) {
        pending.textContent = "已上传";
        pending.classList.remove("pending");
        pending.classList.add("ready");
      }
      const uploadBox = chat.querySelector(".proof-upload-box");
      if (uploadBox) uploadBox.remove();
      const proofMeta = chat.querySelectorAll(".proof-meta");
      if (proofMeta && proofMeta[1]) {
        proofMeta[1].textContent = "证书材料已上传，等待平台复核";
      }
    }

    function goD() {
      if (!uploadDone || stage !== "C") return;
      stage = "D";
      msgAI("申诉材料有效，你可以再说说申诉理由，可以让审核人员更好判断你没有违规。");
      msgAI("请按住底部语音输入框开始录音，松手自动发送。");
    }

    function holdStart() {
      if ((stage !== "D" && stage !== "B" && stage !== "A") || isHolding) return;
      isHolding = true;
      wave.classList.add("active");
      voiceText.textContent = "松开发送...";
      holdTimer = setTimeout(() => {}, 1200);
    }

    function holdEnd() {
      if (!isHolding || (stage !== "D" && stage !== "B" && stage !== "A")) return;
      isHolding = false;
      clearTimeout(holdTimer);
      wave.classList.remove("active");
      voiceText.textContent = "按住说话";
      if (stage === "A") {
        goB("我要申诉");
        return;
      }
      if (stage === "B") {
        msgUser("我没有这个材料");
        sendMaterialPathGuide();
        return;
      }
      goE();
    }

    function goE() {
      if (reasonDone) return;
      stage = "E";
      reasonDone = true;
      msgUser(
        "我是具备10年金融销售资质的，你们也没有在我发文的时候提示我需要做资质认证，请帮我尽快审核，恢复账号状态！" +
        '<div class="tiny">小安<span class="ai-badge">AI</span> 已润色</div>'
      );
      setTimeout(() => runAfterGraphicAILoad(goF), 400);
    }

    function goF() {
      stage = "F";
      msgAI("收到你的申诉理由，材料已经完备，是否要提交申诉？");
      chips([{ label: "确认提交", onClick: goG }]);
    }

    function goG() {
      if (stage !== "F") return;
      stage = "G";
      msgUser("确认提交");
      runAfterGraphicAILoad(() => {
        msgAI(
          "<span class='status-ok'>已成功提交申诉</span>\n" +
          "受理编号 <span class='mono'>#AP20240115-8821</span>\n" +
          "预计 3-5 个工作日内出结果\n" +
          "请耐心等待审核结果 💐"
        );
      });
    }

    ["mousedown", "touchstart"].forEach((evt) => {
      voiceBox.addEventListener(evt, (e) => {
        e.preventDefault();
        holdStart();
      });
    });
    ["mouseup", "mouseleave", "touchend", "touchcancel"].forEach((evt) => {
      voiceBox.addEventListener(evt, (e) => {
        e.preventDefault();
        holdEnd();
      });
    });

    certBackBtn.addEventListener("click", closeCertificationPage);
    learnBackBtn.addEventListener("click", closeLearnPage);

    pageA();
  </script>
</body>
</html>
